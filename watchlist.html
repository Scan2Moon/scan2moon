<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <title>Token Watchlist — Scan2Moon</title>
  <meta name="description" content="Track your Solana tokens in one place. Monitor live risk scores, prices and market conditions across your personal watchlist." />
  <meta property="og:type"         content="website" />
  <meta property="og:site_name"    content="Scan2Moon" />
  <meta property="og:url"          content="https://scan2moon.com/watchlist.html" />
  <meta property="og:title"        content="Token Watchlist — Scan2Moon" />
  <meta property="og:description"  content="Track your Solana tokens in one place. Monitor live risk scores, prices and market conditions across your personal watchlist." />
  <meta property="og:image"        content="https://scan2moon.com/headerweb.png" />
  <meta property="og:image:width"  content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:site"        content="@Scan2Moon" />
  <meta name="twitter:title"       content="Token Watchlist — Scan2Moon" />
  <meta name="twitter:description" content="Track your Solana tokens in one place. Monitor live risk scores, prices and market conditions across your personal watchlist." />
  <meta name="twitter:image"       content="https://scan2moon.com/headerweb.png" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="scanner-hero.css" />
  <link rel="stylesheet" href="watchlist.css" />
</head>
<body>
<div class="app">

  <header class="hero-header">
    <a href="https://x.com/Scan2Moon" target="_blank" class="x-follow-btn">Follow us on X</a>
  </header>

  <!-- NAV injected by nav.js -->

  <!-- HERO -->
  <div class="scanner-hero">
    <div class="scanner-hero-left">
      <div class="scanner-pulse-dot"></div>
      <div>
        <div class="scanner-title" data-i18n="watchlist_title">⭐ TOKEN WATCHLIST</div>
        <div class="scanner-subtitle" data-i18n="watchlist_sub">Your saved tokens • Re-scan anytime • Track your picks</div>
      </div>
    </div>
    <div class="scanner-hero-right">
      <div class="scanner-stat-pill" id="wlCountPill">0 tokens</div>
      <button class="wl-clear-all-btn" id="wlClearAll" data-i18n="wl_clear_all">🗑️ Clear All</button>
    </div>
  </div>

  <!-- WATCHLIST PANEL -->
  <div class="panel">
    <div class="panel-title" data-i18n="wl_saved_tokens">⭐ SAVED TOKENS</div>
    <div class="panel-body" id="watchlistBody">
      <!-- filled by watchlist.js -->
    </div>
  </div>

  <!-- COMMUNITY -->
  <div class="panel">
    <div class="panel-title" data-i18n="community_panel">Scan2Moon Community</div>
    <div class="panel-body" id="communityPanel"></div>
  </div>

  <footer class="footer">
    <div class="footer-left" data-i18n="footer_disclaimer">Informational tool only. Always DYOR.</div>
    <div class="footer-right">
      <span class="version">Version V2.0</span>
      <span class="separator">•</span>
      <span class="powered" data-i18n="footer_powered">Powered by Scan2Moon</span>
    </div>
  </footer>

</div>
<script type="module" src="watchlist.js"></script>
</body>
</html>
