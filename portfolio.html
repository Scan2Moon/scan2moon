<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <title>Portfolio Scanner — Scan2Moon</title>
  <meta name="description" content="Scan your entire Solana wallet portfolio at once. See risk scores, P&amp;L and market data for every token you hold." />
  <meta property="og:type"         content="website" />
  <meta property="og:site_name"    content="Scan2Moon" />
  <meta property="og:url"          content="https://scan2moon.com/portfolio.html" />
  <meta property="og:title"        content="Portfolio Scanner — Scan2Moon" />
  <meta property="og:description"  content="Scan your entire Solana wallet portfolio at once. See risk scores, P&L and market data for every token you hold." />
  <meta property="og:image"        content="https://scan2moon.com/headerweb.png" />
  <meta property="og:image:width"  content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:site"        content="@Scan2Moon" />
  <meta name="twitter:title"       content="Portfolio Scanner — Scan2Moon" />
  <meta name="twitter:description" content="Scan your entire Solana wallet portfolio at once. See risk scores, P&L and market data for every token you hold." />
  <meta name="twitter:image"       content="https://scan2moon.com/headerweb.png" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="style-portfolio.css" />
  <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <header class="hero-header">
    <a href="https://x.com/Scan2Moon" target="_blank" class="x-follow-btn">
      Follow us on X
    </a>
  </header>

  <!-- NAV injected by nav.js -->

  <!-- HERO BAR -->
  <div class="port-hero">
    <div class="port-hero-left">
      <div class="port-pulse-dot"></div>
      <div>
        <div class="port-title">💼 PORTFOLIO SCANNER</div>
        <div class="port-subtitle">Paste any Solana wallet — get full risk analysis on every token you hold</div>
      </div>
    </div>
  </div>

  <!-- SCAN BAR -->
  <div class="port-scan-bar">
    <input
      id="walletInput"
      type="text"
      data-i18n="portfolio_placeholder" placeholder="Paste Solana wallet address…"
      autocomplete="off"
      spellcheck="false"
    />
    <button id="portfolioScanBtn"><span data-i18n="portfolio_scan_btn">Scan Wallet</span><span id="scanBtnText">🔍 Scan Wallet</span>
    </button>
  </div>

  <!-- SUMMARY PANEL — hidden until scan -->
  <div class="panel" id="summaryPanel" style="display:none;">
    <div class="panel-title" data-i18n="portfolio_overview">📊 PORTFOLIO OVERVIEW</div>
    <div class="panel-body" id="summaryBody"></div>
  </div>

  <!-- TOKEN LIST PANEL — hidden until scan -->
  <div class="panel" id="tokensPanel" style="display:none;">
    <div class="panel-header">
      <div class="panel-title" data-i18n="portfolio_holdings">🪙 TOKEN HOLDINGS</div>
      <div class="port-filter-row" id="filterRow"></div>
    </div>
    <div class="panel-body" id="tokensBody">
    </div>
  </div>

  <!-- COMMUNITY PANEL -->
  <div class="panel">
    <div class="panel-title" data-i18n="community_panel">Scan2Moon Community</div>
    <div class="panel-body" id="communityPanel"></div>
  </div>

  <footer class="footer">
    <div class="footer-left" data-i18n="footer_disclaimer">Informational tool only. Always DYOR.</div>
    <div class="footer-right">
      <span class="version">Version V2.0</span>
      <span class="separator">•</span>
      <span class="powered" data-i18n="footer_powered">Powered by Scan2Moon</span>
    </div>
  </footer>

</div>

<script type="module" src="portfolio.js"></script>
</body>
</html>
